<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>靈魂色塊：有機墨染版</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #e5e0d0; }
        
        /* UI 對話框 */
        #interface {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
            font-family: 'PingFang TC', 'Noto Serif TC', serif;
        }

        #dialog-box {
            position: absolute; bottom: 50px; left: 50%;
            transform: translateX(-50%); width: 85%; max-width: 500px;
            background: rgba(255, 255, 255, 0.95);
            color: #333; padding: 30px; border-radius: 20px;
            text-align: center; display: none; pointer-events: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .btn {
            background: #4a4a4a; color: #fff; border: none;
            padding: 12px 30px; border-radius: 30px; cursor: pointer;
            font-size: 1em; transition: 0.3s;
        }
        .btn:hover { background: #000; }

        #title-hint {
            position: absolute; top: 40px; width: 100%;
            text-align: center; color: rgba(0,0,0,0.3);
            letter-spacing: 5px; font-size: 0.9em;
        }
    </style>
</head>
<body>

    <div id="interface">
        <div id="title-hint">觸碰漂浮的墨染靈魂</div>
        <div id="dialog-box">
            <p id="question-text"></p>
            <button class="btn" id="action-btn" onclick="handleAction()">對它傾訴...</button>
        </div>
    </div>

    <a-scene embedded cursor="rayOrigin: mouse" raycaster="objects: .color-soul">
        
        <a-assets>
            <img id="my-bg" src="IMG_3120.jpg">
            <img id="blob-mask" src="blob-shape.png">
        </a-assets>

        <a-sky src="#my-bg" rotation="0 -90 0"></a-sky>
        
        <a-entity light="type: ambient; intensity: 0.9; color: #fff"></a-entity>

        <a-entity camera position="0 1.6 0"></a-entity>

    </a-scene>

    <script>
        // 更新顏色資料庫，加入更具詩意的問題
        const colors = [
            { c: '#d62828', q: '灼熱的硃砂紅。它是你心頭的熱血，還是警示的憤怒？', a: '紅色的能量正在你的傾訴中沉澱...' },
            { c: '#f77f00', q: '這抹橘色正散發微光。在自由的世界裡，它對你而言是什麼？', a: '橘色的溫暖已經包圍了你的感受。' },
            { c: '#fcbf49', q: '閃耀的藤黃。這抹光亮，是未來的希望還是昨日的輝煌？', a: '黃色的光芒記錄了你的話語。' },
            { c: '#003049', q: '深沉的蔚藍。你是否感到一絲迷茫，或是深邃的安穩？', a: '深海般的藍，靜靜聆聽你的秘密。' },
            { c: '#6a994e', q: '新生的石青綠。它是成長的喜悅，還是平靜的依靠？', a: '生命力的綠意在回應你的傾訴。' },
            { c: '#7b2cbf', q: '神祕的石蓮紫。它像是一場夢，你想留在夢裡嗎？', a: '夢境的邊緣，你的靈魂變得輕盈。' }
        ];

        const scene = document.querySelector('a-scene');
        const dialog = document.getElementById('dialog-box');
        const qText = document.getElementById('question-text');
        const btn = document.getElementById('action-btn');
        let activeSoul = null;

        function spawnSouls() {
            for (let i = 0; i < 35; i++) {
                const data = colors[i % colors.length];
                // 使用 <a-image> 來顯示我們的形狀圖層
                const soul = document.createElement('a-image');
                
                // 隨機分佈
                const x = (Math.random() - 0.5) * 8;
                const y = Math.random() * 2.5 + 0.5;
                const z = -Math.random() * 5 - 1.5;

                soul.setAttribute('position', {x, y, z});
                
                // 設定我們預載的純白形狀圖片
                soul.setAttribute('src', '#blob-mask');
                
                // 設定動態顏色，並開啟透明度 (暈染效果)
                soul.setAttribute('material', {
                    color: data.c,
                    transparent: true,
                    opacity: 0.8, // 柔和的半透明
                    shader: 'flat' // 不受燈光干擾，保持形狀顏色純淨
                });

                // 隨機旋轉與縮放，增加多樣性
                const randomScale = Math.random() * 0.4 + 0.3;
                soul.setAttribute('scale', `${randomScale} ${randomScale} ${randomScale}`);
                soul.setAttribute('rotation', `0 0 ${Math.random() * 360}`); // 隨機Z軸旋轉，看起來更自然
                
                soul.setAttribute('class', 'color-soulInteractable color-soul');
                
                // 漂浮動畫
                soul.setAttribute('animation', {
                    property: 'position',
                    to: `${x} ${y + (Math.random()-0.5)*1.2} ${z + (Math.random()-0.5)*1.2}`,
                    dur: 7000 + Math.random() * 5000,
                    dir: 'alternate',
                    loop: true,
                    easing: 'easeInOutSine'
                });

                // 點擊事件
                soul.addEventListener('mousedown', () => {
                    activeSoul = data;
                    dialog.style.display = 'block';
                    qText.innerText = data.q;
                    btn.innerText = '對它傾訴...';
                    btn.disabled = false;
                    
                    // 點擊時「暈開」放大並變透明
                    soul.setAttribute('animation__scale', 'property: scale; to: 1.5 1.5 1.5; dur: 400');
                    soul.setAttribute('animation__opacity', 'property: material.opacity; to: 0.3; dur: 400');
                });

                scene.appendChild(soul);
            }
        }

        function handleAction() {
            qText.innerText = "正在聆聽你的心聲......（請對著螢幕傾訴）";
            btn.disabled = true;
            setTimeout(() => {
                qText.innerText = activeSoul.a;
                setTimeout(() => { dialog.style.display = 'none'; }, 2500);
            }, 2000);
        }

        // 確保在資產載入完成後再生成色塊
        scene.addEventListener('loaded', spawnSouls);
    </script>
</body>
</html>
