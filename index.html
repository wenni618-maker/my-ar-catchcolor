<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>靈魂色塊：有機墨染空間</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f7f1e1; /* 設定一個宣紙暖白色，避免圖片載入失敗時變黑 */ }
        
        /* UI 文字層 */
        #interface {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
            font-family: 'PingFang TC', serif;
        }

        /* 底部對話框 */
        #dialog-box {
            position: absolute; bottom: 50px; left: 50%;
            transform: translateX(-50%); width: 85%; max-width: 500px;
            background: rgba(255, 255, 255, 0.95);
            color: #333; padding: 30px; border-radius: 20px;
            text-align: center; display: none; pointer-events: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .btn {
            background: #4a4a4a; color: #fff; border: none;
            padding: 12px 30px; border-radius: 30px; cursor: pointer;
            font-size: 1em; font-weight: bold; transition: 0.3s;
        }
        .btn:hover { background: #000; transform: scale(1.05); }

        #title-hint {
            position: absolute; top: 40px; width: 100%;
            text-align: center; color: rgba(0,0,0,0.3);
            letter-spacing: 5px; font-size: 0.9em;
        }
    </style>
</head>
<body>

    <div id="interface">
        <div id="title-hint">觸碰漂浮的墨染靈魂</div>
        <div id="dialog-box">
            <p id="question-text"></p>
            <button class="btn" onclick="handleAction()">對它傾訴...</button>
        </div>
    </div>

    <a-scene embedded cursor="rayOrigin: mouse" raycaster="objects: .color-soul" renderer="logarithmicDepthBuffer: true;">
        
        <a-assets>
            <img id="my-bg" src="https://i.imgur.com/r8iI7bT.jpeg" crossorigin="anonymous">
            
            <img id="blob-mask" src="https://i.imgur.com/M6p3j7f.png" crossorigin="anonymous">
        </a-assets>

        <a-sky src="#my-bg" rotation="0 -90 0"></a-sky>
        
        <a-entity light="type: ambient; intensity: 1.2; color: #fff"></a-entity>

        <a-entity camera look-controls position="0 1.6 0"></a-entity>

    </a-scene>

    <script>
        // 東方文學感提問資料庫
        const colorsData = [
            { c: '#E63946', q: '你抓住了這抹硃砂紅，它是灼熱的憤怒，還是溫暖的夕陽？', a: '紅色的能量在你的傾訴中沉澱...' },
            { c: '#0A0A0A', q: '沉靜的墨黑。它是萬物的起點，還是終極的虛無？', a: '墨色暈開，接納了你深邃的思想。' },
            { c: '#A8DADC', q: '清冽的石青綠。它是早春的溪水，還是自由的呼吸？', a: '藍色的波紋正擴散，帶走你的憂愁。' },
            { c: '#fcbf49', q: '明亮的藤黃。它是希望的晨曦，還是昨日的輝煌？', a: '黃色的光芒記錄了你的話語。' },
            { c: '#7b2cbf', q: '神祕的石蓮紫。它是醒不來的夢，你想留在夢裡嗎？', a: '夢境的邊緣，你的靈魂變得輕盈。' }
        ];

        const scene = document.querySelector('a-scene');
        const dialog = document.getElementById('dialog-box');
        const qText = document.getElementById('question-text');

        function spawnSouls() {
            console.log("有機墨染場景已就緒");
            for (let i = 0; i < 35; i++) {
                const data = colorsData[i % colorsData.length];
                
                // 核心技術：使用 <a-image> 來顯示我們的形狀材質
                const soul = document.createElement('a-image');
                
                const radius = Math.random() * 5 + 3; // 環繞半徑 3-8 米
                const theta = Math.random() * Math.PI * 2; // 360度
                
                // 計算極坐標，讓色塊環繞四周
                const x = radius * Math.sin(theta);
                const y = Math.random() * 2.5 + 0.5;
                const z = radius * Math.cos(theta);

                soul.setAttribute('position', {x, y, z});
                soul.setAttribute('class', 'color-soulInteractable color-soul');
                
                // 讀取我們預載的有機噴濺形狀 PNG
                soul.setAttribute('src', '#blob-mask');
                
                // 設定暈染質感
                soul.setAttribute('material', {
                    color: data.c, // 動態給予東方色彩
                    transparent: true,
                    opacity: 0.8, // 柔和的半透明
                    shader: 'flat', // 保持顏色純淨
                    side: 'double', // 雙面可見
                    alphaTest: 0.5 // 確保透明背景邊緣整潔
                });

                // 讓平面自動面向相機 ( billboard 效果 )
                soul.setAttribute('look-at', '[camera]');

                // 隨機旋轉與縮放，增加自然感
                const randomScale = Math.random() * 0.4 + 0.3; // 縮放 0.3 - 0.7
                soul.setAttribute('scale', `${randomScale} ${randomScale} ${randomScale}`);
                soul.setAttribute('rotation', `0 0 ${Math.random() * 360}`); // 隨機Z軸旋轉

                // 漂浮動畫
                soul.setAttribute('animation', {
                    property: 'position',
                    to: `${x} ${y + (Math.random()-0.5)*1.2} ${z + (Math.random()-0.5)*1.2}`,
                    dur: 7000 + Math.random() * 5000,
                    dir: 'alternate',
                    loop: true,
                    easing: 'easeInOutSine'
                });

                // 點擊事件
                soul.addEventListener('mousedown', () => {
                    dialog.style.display = 'block';
                    qText.innerText = data.q;
                    
                    // 點擊視覺回饋：暈開放大並變透明
                    soul.setAttribute('animation__scale', 'property: scale; to: 1.5 1.5 1.5; dur: 400');
                    soul.setAttribute('animation__opacity', 'property: material.opacity; to: 0.3; dur: 400');
                });

                scene.appendChild(soul);
            }
        }

        // 啟動邏輯
        if (scene.hasLoaded) {
            spawnSouls();
        } else {
            scene.addEventListener('loaded', spawnSouls);
        }

        function handleAction() {
            qText.innerText = "正在聆聽你的心聲......（請對著螢幕傾訴）";
            setTimeout(() => {
                qText.innerText = universalResponse;
                setTimeout(() => { dialog.style.display = 'none'; }, 2500);
            }, 2000);
        }
    </script>
</body>
</html>
