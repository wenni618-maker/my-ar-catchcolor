<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>靈魂色塊：凝聚墨染空間</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #d9d1b3; } 
        #interface { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 10; font-family: 'PingFang TC', sans-serif; 
        }
        #dialog-box { 
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); 
            width: 85%; max-width: 450px; background: rgba(255, 255, 255, 0.9); 
            padding: 25px; border-radius: 20px; text-align: center; display: none; 
            pointer-events: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        }
        .btn { 
            background: #333; color: #fff; border: none; padding: 12px 30px; 
            border-radius: 25px; cursor: pointer; margin-top: 15px; font-weight: bold;
        }
        #hint-text {
            position: absolute; top: 30px; width: 100%; text-align: center;
            color: rgba(0,0,0,0.4); letter-spacing: 2px; font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="interface">
        <div id="hint-text">色塊已凝聚在前方，請轉動視角傾聽它們</div>
        <div id="dialog-box">
            <p id="question-text"></p>
            <button class="btn" onclick="handleAction()">對它傾訴...</button>
        </div>
    </div>

    <a-scene id="main-scene" cursor="rayOrigin: mouse" raycaster="objects: .color-soul" renderer="sortObjects: true; alpha: true; antialias: true;">
        
        <a-assets>
            <img id="paper-bg" src="IMG_3120.jpg">
            <img id="splash-texture" src="IMG_3095.png">
        </a-assets>

        <a-sky src="#paper-bg" rotation="0 -90 0"></a-sky>
        <a-entity light="type: ambient; intensity: 1.2"></a-entity>
        <a-entity camera look-controls position="0 1.6 0"></a-entity>
        <a-entity id="soul-container"></a-entity>

    </a-scene>

    <script>
        const colorsData = [
            { c: '#d62828', q: '你抓住了這抹紅，它讓你聯想到溫暖的夕陽，還是灼熱的憤怒？' },
            { c: '#f77f00', q: '這抹橘色正散發微光。在自由的世界裡，它對你而言是什麼？' },
            { c: '#fcbf49', q: '明亮的黃色。它代表的是希望的晨曦，還是逝去的純真？' },
            { c: '#6a994e', q: '新生的綠。它是成長的喜悅，還是平靜的依靠？' },
            { c: '#003049', q: '深邃的藍。你是否感到一絲迷茫，或是深邃的安穩？' }
        ];

        const container = document.getElementById('soul-container');
        const sceneEl = document.querySelector('a-scene');

        if (sceneEl.hasLoaded) { spawnSouls(); } 
        else { sceneEl.addEventListener('loaded', spawnSouls); }

        function spawnSouls() {
            const totalSouls = 80; 
            
            for (let i = 0; i < totalSouls; i++) {
                const data = colorsData[i % colorsData.length];
                const soul = document.createElement('a-image');
                
                // --- 凝聚調整關鍵區 ---
                // 1. 縮小半徑範圍：讓它們集中在距離玩家 3 到 4.5 公尺之間 (原本是 2-6)
                const radius = 3 + Math.random() * 1.5; 
                
                // 2. 限制水平角度：讓它們主要出現在前方 120 度範圍內，而非全方位 360 度散開
                // 如果你還是希望環繞但「密集」，請將這行改回 Math.random() * Math.PI * 2
                const angle = (Math.random() - 0.5) * (Math.PI * 2 / 3); 
                
                const x = Math.sin(angle) * radius;
                const z = -Math.cos(angle) * radius; // 負號確保出現在相機前方
                
                // 3. 縮小高度範圍：集中在胸口到頭部的高度 (1.2m ~ 2.2m)
                const y = 1.2 + Math.random() * 1.0; 
                // ---------------------

                soul.setAttribute('position', {x, y, z});
                soul.setAttribute('src', '#splash-texture');
                soul.setAttribute('class', 'color-soul');
                
                soul.setAttribute('material', {
                    color: data.c,
                    transparent: true,
                    opacity: 0.75,
                    shader: 'flat',
                    depthWrite: false,
                    side: 'double'
                });

                const s = Math.random() * 0.3 + 0.3; 
                soul.setAttribute('scale', {x: s, y: s, z: s});
                soul.setAttribute('rotation', `0 0 ${Math.random() * 360}`);
                soul.setAttribute('look-at', '[camera]');

                // 縮小浮動動畫的幅度，讓整體感更強
                soul.setAttribute('animation', {
                    property: 'position',
                    to: `${x} ${y + 0.2} ${z}`,
                    dur: 3000 + Math.random() * 3000,
                    dir: 'alternate',
                    loop: true,
                    easing: 'easeInOutSine'
                });

                soul.addEventListener('mousedown', () => {
                    const dialog = document.getElementById('dialog-box');
                    const qText = document.getElementById('question-text');
                    dialog.style.display = 'block';
                    qText.innerText = data.q;
                    soul.setAttribute('animation__click', {
                        property: 'scale',
                        to: `${s * 1.4} ${s * 1.4} ${s * 1.4}`,
                        dur: 300,
                        easing: 'easeOutBack'
                    });
                });

                container.appendChild(soul);
            }
        }

        function handleAction() {
            document.getElementById('question-text').innerText = "感受已收錄，謝謝你的分享。";
            setTimeout(() => {
                document.getElementById('dialog-box').style.display = 'none';
            }, 2000);
        }
    </script>
</body>
</html>
