<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>靈魂色塊：暖心墨染空間</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #d9d1b3; } 
        
        #interface { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 10; font-family: 'PingFang TC', 'STHeiti', sans-serif; 
        }
        
        #dialog-box { 
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); 
            width: 85%; max-width: 450px; background: rgba(255, 255, 255, 0.95); 
            padding: 25px; border-radius: 25px; text-align: center; display: none; 
            pointer-events: auto; box-shadow: 0 15px 35px rgba(0,0,0,0.15); 
        }
        
        .btn { 
            background: #4a4a4a; color: #fff; border: none; padding: 12px 35px; 
            border-radius: 30px; cursor: pointer; margin-top: 15px; font-weight: bold;
            font-size: 16px; transition: 0.3s;
        }
        .btn:hover { background: #000; letter-spacing: 1px; }

        #question-text { line-height: 1.6; color: #333; font-size: 18px; margin-bottom: 10px; }
        
        #hint-text {
            position: absolute; top: 30px; width: 100%; text-align: center;
            color: rgba(0,0,0,0.4); letter-spacing: 3px; font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="interface">
        <div id="hint-text">思緒如墨般匯聚，輕觸漂浮的色塊...</div>
        <div id="dialog-box">
            <p id="question-text"></p>
            <button class="btn" id="action-btn" onclick="handleAction()">對它傾訴...</button>
        </div>
    </div>

    <a-scene id="main-scene" cursor="rayOrigin: mouse" raycaster="objects: .color-soul" renderer="sortObjects: true; alpha: true; antialias: true;">
        <a-assets>
            <img id="paper-bg" src="IMG_3120.jpg">
            <img id="splash-texture" src="IMG_3095.png">
        </a-assets>

        <a-sky src="#paper-bg" rotation="0 -90 0"></a-sky>
        
        <a-entity light="type: ambient; intensity: 1.2"></a-entity>
        
        <a-entity camera look-controls position="0 1.6 0"></a-entity>

        <a-entity id="soul-container"></a-entity>
    </a-scene>

    <script>
        // 互動內容資料
        const colorsData = [
            { c: '#d62828', q: '這抹紅如此強烈，你的內心是否也有股熱切的能量想被看見？' },
            { c: '#f77f00', q: '橘色的微光閃動著。在那些不安的時刻，什麼能帶給你溫暖？' },
            { c: '#fcbf49', q: '明亮的黃色。如果它是一段回回忆，那會是哪一個溫柔的瞬間？' },
            { c: '#6a994e', q: '安靜的綠色。此刻的你，是否渴望像這抹綠一樣安穩地呼吸？' },
            { c: '#003049', q: '深邃的藍色。有些話如果不說出來，是否會像深海一樣沉重？' }
        ];

        // 情緒價值語句庫 (Satir 薩提爾模式概念：接納與同理)
        const emotionalResponses = [
            "謝謝你的信任，你的感受在這裡是被允許且安全的。",
            "我聽見了。這份情緒辛苦你了，現在把它留給這個空間吧。",
            "沒關係的，不管是什麼樣的想法，都值得被溫柔對待。",
            "這抹色彩接住了你的故事，你可以試著放下一些重量了。",
            "你的心聲像墨水般暈開，轉化成了空間裡平靜的力量。"
        ];

        const container = document.getElementById('soul-container');
        const sceneEl = document.querySelector('a-scene');
        let currentSoul = null; // 記錄當前點擊的色塊

        // 確保 A-Frame 場景載入後執行
        if (sceneEl.hasLoaded) { spawnSouls(); } 
        else { sceneEl.addEventListener('loaded', spawnSouls); }

        function spawnSouls() {
            const totalSouls = 80; 
            for (let i = 0; i < totalSouls; i++) {
                const data = colorsData[i % colorsData.length];
                const soul = document.createElement('a-image');
                
                // 適中密度的分布算法：環繞半徑 2.5m 到 5.5m，高度集中
                const radius = 2.5 + Math.random() * 3.0; 
                const angle = Math.random() * Math.PI * 2; // 360 度環繞
                const x = Math.sin(angle) * radius;
                const z = -Math.cos(angle) * radius;
                const y = 0.8 + Math.random() * 2.2; // 高度在 0.8m 到 3m 之間

                soul.setAttribute('position', {x, y, z});
                soul.setAttribute('src', '#splash-texture');
                soul.setAttribute('class', 'color-soulInteractable color-soul'); // 加上 Interactable class
                
                // 設定材質：解決透明遮擋與顏色呈現
                soul.setAttribute('material', {
                    color: data.c,
                    transparent: true,
                    opacity: 0.75,
                    shader: 'flat',
                    depthWrite: false, // 關鍵：防止透明邊緣遮擋
                    side: 'double'
                });

                // 隨機縮放與初始旋轉
                const s = Math.random() * 0.3 + 0.35; 
                soul.setAttribute('scale', {x: s, y: s, z: s});
                soul.setAttribute('rotation', `0 0 ${Math.random() * 360}`);

                // 始終面向相機
                soul.setAttribute('look-at', '[camera]');

                // --- 修改處：增大漂浮動畫的晃動幅度 ---
                // y + (Math.random() * 0.8 - 0.4) 讓上下晃動幅度更大 (原本是 0.4)
                // dur (持續時間) 稍微變長，讓大幅度晃動看起來依然柔和
                soul.setAttribute('animation', {
                    property: 'position',
                    to: `${x} ${y + (Math.random() * 0.8 - 0.4)} ${z}`,
                    dur: 4000 + Math.random() * 3000,
                    dir: 'alternate',
                    loop: true,
                    easing: 'easeInOutSine'
                });

                // 點擊事件監聽
                soul.addEventListener('mousedown', () => {
                    currentSoul = soul;
                    const dialog = document.getElementById('dialog-box');
                    const qText = document.getElementById('question-text');
                    const btn = document.getElementById('action-btn');
                    
                    btn.style.display = 'inline-block';
                    dialog.style.display = 'block';
                    qText.innerText = data.q;

                    // 點擊縮放反饋
                    soul.setAttribute('animation__click', {
                        property: 'scale',
                        to: `${s * 1.3} ${s * 1.3} ${s * 1.3}`,
                        dur: 300
                    });
                });

                container.appendChild(soul);
            }
        }

        function handleAction() {
            const qText = document.getElementById('question-text');
            const btn = document.getElementById('action-btn');
            
            // 隱藏按鈕，顯示隨機回饋語
            btn.style.display = 'none';
            const randomMsg = emotionalResponses[Math.floor(Math.random() * emotionalResponses.length)];
            qText.innerText = randomMsg;

            // 視覺儀式感：當前色塊慢慢升起並淡出
            if (currentSoul) {
                const currentPos = currentSoul.getAttribute('position');
                currentSoul.setAttribute('animation__fadeout', {
                    property: 'position',
                    to: `${currentPos.x} ${currentPos.y + 2.5} ${currentPos.z}`,
                    dur: 2800,
                    easing: 'easeInQuad'
                });
                currentSoul.setAttribute('animation__opacity', {
                    property: 'material.opacity',
                    to: 0,
                    dur: 2000,
                    easing: 'linear'
                });
                // 移除 class 防止重複點擊，並在動畫後移除物件
                currentSoul.classList.remove('color-soulInteractable'); 
                currentSoul.classList.remove('color-soul');
                setTimeout(() => { if(currentSoul.parentNode) currentSoul.parentNode.removeChild(currentSoul); }, 2800);
            }

            // 3.5 秒後關閉對話框
            setTimeout(() => {
                document.getElementById('dialog-box').style.display = 'none';
            }, 3500);
        }
    </script>
</body>
</html>
