<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>靈魂色塊：墨染對話空間</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #d9d1b3; } 
        #interface { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 10; font-family: 'PingFang TC', 'STHeiti', sans-serif; 
        }
        
        #dialog-box { 
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); 
            width: 85%; max-width: 450px; background: rgba(255, 255, 255, 0.95); 
            padding: 25px; border-radius: 25px; text-align: center; display: none; 
            pointer-events: auto; box-shadow: 0 15px 35px rgba(0,0,0,0.15); 
        }

        #input-area { display: none; margin-top: 15px; }
        
        #user-input {
            width: 80%; padding: 10px; border-radius: 20px; border: 1px solid #ccc;
            outline: none; font-size: 16px; margin-bottom: 10px;
        }

        .btn { 
            background: #4a4a4a; color: #fff; border: none; padding: 10px 25px; 
            border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 14px;
        }
        
        #question-text { line-height: 1.6; color: #333; font-size: 18px; margin-bottom: 10px; }
        #hint-text {
            position: absolute; top: 30px; width: 100%; text-align: center;
            color: rgba(0,0,0,0.4); letter-spacing: 3px; font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="interface">
        <div id="hint-text">點擊色塊，將你的情緒寫在墨色裡...</div>
        <div id="dialog-box">
            <p id="question-text"></p>
            <div id="input-area">
                <input type="text" id="user-input" placeholder="在這裡寫下你的心情..." autocomplete="off">
                <br>
                <button class="btn" onclick="handleChat()">傾訴完畢</button>
            </div>
        </div>
    </div>

    <a-scene cursor="rayOrigin: mouse" raycaster="objects: .color-soul" renderer="sortObjects: true; alpha: true;">
        <a-assets>
            <img id="paper-bg" src="IMG_3120.jpg">
            <img id="splash-texture" src="IMG_3095.png">
        </a-assets>

        <a-sky src="#paper-bg" rotation="0 -90 0"></a-sky>
        <a-entity camera look-controls position="0 1.6 0"></a-entity>
        <a-entity id="soul-container"></a-entity>
    </a-scene>

    <script>
        const colorsData = [
            { c: '#d62828', q: '這抹紅如此強烈，此刻你心中有什麼想宣洩的能量嗎？' },
            { c: '#f77f00', q: '橘色的微光閃動著。有哪些事正讓你感到溫暖或不安？' },
            { c: '#fcbf49', q: '明亮的黃色。如果要把一個願望放進這裡，那會是什麼？' },
            { c: '#6a994e', q: '安靜的綠色。關於平靜，你現在最想對自己說什麼？' },
            { c: '#003049', q: '深邃的藍色。有些話如果不說出來會很沉重，想聊聊嗎？' }
        ];

        const container = document.getElementById('soul-container');
        const sceneEl = document.querySelector('a-scene');
        const dialog = document.getElementById('dialog-box');
        const inputArea = document.getElementById('input-area');
        const userInput = document.getElementById('user-input');
        const qText = document.getElementById('question-text');
        let currentSoul = null;

        if (sceneEl.hasLoaded) { spawnSouls(); } 
        else { sceneEl.addEventListener('loaded', spawnSouls); }

        function spawnSouls() {
            for (let i = 0; i < 80; i++) {
                const data = colorsData[i % colorsData.length];
                const soul = document.createElement('a-image');
                const radius = 2.5 + Math.random() * 3.0; 
                const angle = Math.random() * Math.PI * 2;
                const x = Math.sin(angle) * radius;
                const z = -Math.cos(angle) * radius;
                const y = 0.8 + Math.random() * 2.2;

                soul.setAttribute('position', {x, y, z});
                soul.setAttribute('src', '#splash-texture');
                soul.setAttribute('class', 'color-soul');
                soul.setAttribute('material', {
                    color: data.c, transparent: true, opacity: 0.75,
                    shader: 'flat', depthWrite: false, side: 'double'
                });

                const s = Math.random() * 0.3 + 0.35; 
                soul.setAttribute('scale', {x: s, y: s, z: s});
                soul.setAttribute('look-at', '[camera]');

                soul.setAttribute('animation', {
                    property: 'position',
                    to: `${x} ${y + (Math.random() * 0.8 - 0.4)} ${z}`,
                    dur: 4000 + Math.random() * 3000,
                    dir: 'alternate', loop: true, easing: 'easeInOutSine'
                });

                soul.addEventListener('mousedown', () => {
                    currentSoul = soul;
                    dialog.style.display = 'block';
                    inputArea.style.display = 'block';
                    qText.innerText = data.q;
                    userInput.value = ""; 
                    userInput.focus();
                });

                container.appendChild(soul);
            }
        }

        function handleChat() {
            const text = userInput.value.trim();
            if (text === "") {
                qText.innerText = "沒關係的，即便只是留白，我也在這裡聽著。";
            } else {
                // 簡單的關鍵字回饋邏輯
                if (text.includes("累") || text.includes("壓力") || text.includes("煩")) {
                    qText.innerText = "聽起來你承載了很多。這抹顏色會幫你分擔一點重量，放心地交給它吧。";
                } else if (text.includes("開心") || text.includes("好") || text.includes("棒")) {
                    qText.innerText = "真為你感到高興！讓這份喜悅像墨水一樣，在空間裡暈染開來。";
                } else if (text.includes("難過") || text.includes("哭") || text.includes("傷心")) {
                    qText.innerText = "想哭也沒關係的，這裡很安靜，它會溫柔地包裹你的眼淚。";
                } else {
                    qText.innerText = "謝謝你願意分享。你的話語已經化作色彩，成為這片空間的一部分。";
                }
            }

            inputArea.style.display = 'none'; // 隱藏輸入區

            if (currentSoul) {
                const pos = currentSoul.getAttribute('position');
                currentSoul.setAttribute('animation__fadeout', {
                    property: 'position', to: `${pos.x} ${pos.y + 3} ${pos.z}`, dur: 3000, easing: 'easeInQuad'
                });
                currentSoul.setAttribute('animation__opacity', {
                    property: 'material.opacity', to: 0, dur: 2500, easing: 'linear'
                });
                currentSoul.classList.remove('color-soul');
                setTimeout(() => { if(currentSoul.parentNode) currentSoul.parentNode.removeChild(currentSoul); }, 3000);
            }

            setTimeout(() => { dialog.style.display = 'none'; }, 4500);
        }
    </script>
</body>
</html>
