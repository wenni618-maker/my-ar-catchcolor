<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>靈魂色塊：深層對話空間</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #d9d1b3; } 
        #interface { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 10; font-family: 'PingFang TC', 'STHeiti', sans-serif; 
        }
        
        #dialog-box { 
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); 
            width: 85%; max-width: 450px; background: rgba(255, 255, 255, 0.95); 
            padding: 25px; border-radius: 25px; text-align: center; display: none; 
            pointer-events: auto; box-shadow: 0 15px 35px rgba(0,0,0,0.15); 
        }

        #input-area { display: none; margin-top: 15px; }
        
        #user-input {
            width: 85%; padding: 12px; border-radius: 20px; border: 1px solid #ccc;
            outline: none; font-size: 16px; margin-bottom: 10px; background: #fdfdfd;
        }

        .btn { 
            background: #4a4a4a; color: #fff; border: none; padding: 10px 30px; 
            border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 14px;
        }
        
        #question-text { line-height: 1.7; color: #333; font-size: 18px; margin-bottom: 10px; font-weight: 500; }
        #hint-text {
            position: absolute; top: 30px; width: 100%; text-align: center;
            color: rgba(0,0,0,0.4); letter-spacing: 3px; font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="interface">
        <div id="hint-text">當你觸碰畫面，試著抓住了一抹色彩後...</div>
        <div id="dialog-box">
            <p id="question-text"></p>
            <div id="input-area">
                <input type="text" id="user-input" placeholder="試著描述那種感覺..." autocomplete="off">
                <br>
                <button class="btn" onclick="handleChat()">傾訴完畢</button>
            </div>
        </div>
    </div>

    <a-scene cursor="rayOrigin: mouse" raycaster="objects: .color-soul" renderer="sortObjects: true; alpha: true;" vr-mode-ui="enabled: false">
        <a-assets>
            <img id="paper-bg" src="IMG_3120.jpg">
            <img id="splash-texture" src="IMG_3095.png">
        </a-assets>

        <a-sky src="#paper-bg" rotation="0 -90 0"></a-sky>
        <a-entity camera look-controls position="0 1.6 0"></a-entity>
        <a-entity id="soul-container"></a-entity>
    </a-scene>

    <script>
        // --- 深度引導題庫 ---
        const colorsData = [
            { 
                c: '#d62828', // 紅色
                questions: [
                    '這抹紅若是你身體的一部分，它現在正隱隱作痛，還是充滿跳動的生命力？', 
                    '這抹紅色若有重量，你覺得它現在是輕飄飄的，還是沉甸甸地壓著你？',
                    '想像這抹紅色正在你體內流動，它停留在了哪個部位？那裡是什麼感覺？',
                    '盯著這抹紅，描述它帶給你的第一種感覺。',
                    '如果這抹紅色有溫度，你現在感覺它大約是多少度？',
                    '這抹紅色若是一個動作，它現在正在對你做什麼？'
                ]
            },
            { 
                c: '#f77f00', // 橘色
                questions: [
                    '這抹顏色像不像夕陽最後的餘暉？它讓你感到一種放下的輕鬆，還是一種消逝的落寞？',
                    '如果橘色是一種聲音，它聽起來會是甚麼樣的世界呢？',
                    '如果橘色是一種氣味，它聞起來是清新的，還是讓你感到有些悶熱？用一句話來形容吧!',
                    '你覺得這抹橘色現在最想對你表達什麼？'
                ]
            },
            { 
                c: '#fcbf49', // 黃色
                questions: [
                    '這抹黃色正在對你的視線產生什麼樣的影響？',
                    '如果這抹黃色有重量，你覺得它在你的手掌心是什麼感覺？',
                    '想像你可以走進這抹黃色，那是一個什麼樣的空間？',
                    '這抹黃色在你的世界裡，佔據了什麼樣的角色？'
                ]
            },
            { 
                c: '#6a994e', // 綠色
                questions: [
                    '這抹綠色讓你聯想到了什麼樣的質地或觸感？',
                    '看著這抹綠，觀察你的呼吸產生了什麼樣的變化？',
                    '這抹綠色若是一個天氣，你現在正處於什麼樣的環境中？',
                    '觀察這抹綠，描述它與你之間的距離感。',
                    '如果這抹綠色是一個天氣，描述你現在身處的環境。'
                ]
            },
            { 
                c: '#003049', // 藍色
                questions: [
                    '這抹深藍若是你情緒的深海，你正悠游其中，這時你的內心有什麼感受嗎?',
                    '藍色有時候代表憂鬱。那麼對你而言呢?這個顏色是甚麼樣的存在?',
                    '這抹深藍色讓你感覺自己現在正處於什麼樣的位置？',
                    '如果這抹藍色是一種明暗變化，它現在正在發生什麼？',
                    '盯著這抹藍，你的大腦浮現了哪一個字或畫面？'
                ]
            }
        ];

        const container = document.getElementById('soul-container');
        const sceneEl = document.querySelector('a-scene');
        const dialog = document.getElementById('dialog-box');
        const inputArea = document.getElementById('input-area');
        const userInput = document.getElementById('user-input');
        const qText = document.getElementById('question-text');
        let currentSoul = null;

        if (sceneEl.hasLoaded) { spawnSouls(); } 
        else { sceneEl.addEventListener('loaded', spawnSouls); }

        function spawnSouls() {
            for (let i = 0; i < 80; i++) {
                const data = colorsData[i % colorsData.length];
                const soul = document.createElement('a-image');
                const radius = 2.5 + Math.random() * 3.0; 
                const angle = Math.random() * Math.PI * 2;
                const x = Math.sin(angle) * radius;
                const z = -Math.cos(angle) * radius;
                const y = 0.8 + Math.random() * 2.2;

                soul.setAttribute('position', {x, y, z});
                soul.setAttribute('src', '#splash-texture');
                soul.setAttribute('class', 'color-soul');
                soul.setAttribute('material', {
                    color: data.c, transparent: true, opacity: 0.9,
                    shader: 'flat', depthWrite: false, side: 'double'
                });

                const s = Math.random() * 0.3 + 0.35; 
                soul.setAttribute('scale', {x: s, y: s, z: s});
                soul.setAttribute('look-at', '[camera]');

                soul.setAttribute('animation', {
                    property: 'position',
                    to: `${x} ${y + (Math.random() * 1.0 - 0.5)} ${z}`,
                    dur: 4000 + Math.random() * 3000,
                    dir: 'alternate', loop: true, easing: 'easeInOutSine'
                });

                soul.addEventListener('mousedown', () => {
                    currentSoul = soul;
                    dialog.style.display = 'block';
                    inputArea.style.display = 'block';
                    const randomQ = data.questions[Math.floor(Math.random() * data.questions.length)];
                    qText.innerText = randomQ;
                    userInput.value = ""; 
                    userInput.focus();
                });

                container.appendChild(soul);
            }
        }

        function handleChat() {
            const text = userInput.value.trim();
            if (text === "") {
                qText.innerText = "沒關係，沈默有時也是一種最有力的傾訴。";
            } else {
                if (text.includes("累") || text.includes("壓力") || text.includes("煩") || text.includes("重")) {
                    qText.innerText = "感受到那股重量了。這份色彩會承接住你的疲憊，讓它隨墨跡散去吧。";
                } else if (text.includes("怕") || text.includes("不安") || text.includes("緊張") || text.includes("痛")) {
                    qText.innerText = "這裡很安全。你的脆弱在這些色彩中是勇敢的證明，我會為你守護它。";
                } else if (text.includes("好") || text.includes("順") || text.includes("亮") || text.includes("愛")) {
                    qText.innerText = "讓這份純粹的光亮留在你心底，它會是你度過陰霾時最堅定的力量。";
                } else {
                    qText.innerText = "聽見了。你的覺察已經化作這抹色彩的印記，在這裡安全地存在著。";
                }
            }

            inputArea.style.display = 'none';

            if (currentSoul) {
                const pos = currentSoul.getAttribute('position');
                // 維持升起淡出的視覺回饋，象徵情緒被記錄與釋放
                currentSoul.setAttribute('animation__fadeout', {
                    property: 'position', to: `${pos.x} ${pos.y + 3} ${pos.z}`, dur: 3500, easing: 'easeInQuad'
                });
                currentSoul.setAttribute('animation__opacity', {
                    property: 'material.opacity', to: 0, dur: 3000, easing: 'linear'
                });
                currentSoul.classList.remove('color-soul');
                setTimeout(() => { if(currentSoul.parentNode) currentSoul.parentNode.removeChild(currentSoul); }, 3500);
            }

            setTimeout(() => { dialog.style.display = 'none'; }, 4000);
        }
    </script>
</body>
</html>
