<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>靈魂色塊：墨染有機空間</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <style>
        /* 設定一個暖米色背景兜底，避免圖片載入失敗時變黑 */
        body { margin: 0; overflow: hidden; background-color: #f7f1e1; }
        
        /* UI 文字層 */
        #interface {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
            font-family: 'PingFang TC', serif;
        }

        /* 底部對話框 */
        #dialog-box {
            position: absolute; bottom: 50px; left: 50%;
            transform: translateX(-50%); width: 85%; max-width: 500px;
            background: rgba(255, 255, 255, 0.95);
            color: #333; padding: 30px; border-radius: 20px;
            text-align: center; display: none; pointer-events: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .btn {
            background: #4a4a4a; color: #fff; border: none;
            padding: 12px 30px; border-radius: 30px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="interface">
        <div id="dialog-box">
            <p id="question-text"></p>
            <button class="btn" onclick="handleAction()">對它傾訴...</button>
        </div>
    </div>

    <a-scene embedded cursor="rayOrigin: mouse" raycaster="objects: .color-soulInteractable" renderer="logarithmicDepthBuffer: true;">
        
        <a-assets>
            <img id="my-bg" src="IMG_3120.jpg">
        </a-assets>

        <a-sky src="#my-bg" rotation="0 -90 0"></a-sky>
        
        <a-entity light="type: ambient; intensity: 1.2"></a-entity>

        <a-entity camera look-controls position="0 1.6 0"></a-entity>

    </a-scene>

    <script>
        // 用 SVG路徑 直接在程式碼中畫一個不規則的、帶凹凸的有機色塊形狀
        // 確保在資產載入後再繪製幾何體
        AFRAME.registerGeometry('organic-blob', {
            init: function () {
                var path = new THREE.Shape();
                path.moveTo( 0, 0.5 );
                path.bezierCurveTo( 0.2, 0.6, 0.4, 0.4, 0.5, 0.2 ); // 噴濺點1
                path.bezierCurveTo( 0.6, 0.1, 0.8, 0.3, 0.7, -0.1 ); // 噴濺點2
                path.bezierCurveTo( 0.6, -0.3, 0.4, -0.5, 0, -0.4 ); // 噴濺點3
                path.bezierCurveTo( -0.4, -0.5, -0.6, -0.3, -0.7, -0.1 ); // 噴濺點4
                path.bezierCurveTo( -0.8, 0.2, -0.6, 0.4, -0.5, 0.2 ); // 噴濺點5
                path.bezierCurveTo( -0.4, 0.1, -0.2, 0.6, 0, 0.5 ); // 回到起點
                var geometry = new THREE.ShapeGeometry( path );
                this.geometry = geometry;
            }
        });

        const colorsData = [
            { c: '#E63946', q: '你抓住了這抹硃砂紅，它是灼熱的憤怒，還是溫暖的夕陽？' },
            { c: '#0A0A0A', q: '沉靜的墨黑。它是萬物的起點，還是終極的虛無？' },
            { c: '#A8DADC', q: '清冽的石青綠。它是早春的溪水，還是自由的呼吸？' },
            { c: '#fcbf49', q: '明亮的藤黃。它是希望的晨曦，還是昨日的輝煌？' },
            { c: '#7b2cbf', q: '神祕的石蓮紫。它是醒不來的夢，你想留在夢裡嗎？' }
        ];

        const scene = document.querySelector('a-scene');
        const dialog = document.getElementById('dialog-box');
        const qText = document.getElementById('question-text');

        function spawnSouls() {
            console.log("純程式碼墨染場景已就緒");
            for (let i = 0; i < 35; i++) {
                const data = colorsData[i % colorsData.length];
                
                // 使用自定義的 organic-blob 幾何體
                const soul = document.createElement('a-entity');
                soul.setAttribute('geometry', 'primitive: organic-blob');
                
                const radius = Math.random() * 6 + 3; // 環繞半徑 3-9 米
                const theta = Math.random() * Math.PI * 2; // 360度
                
                const x = radius * Math.sin(theta);
                const y = Math.random() * 2.5 + 0.5;
                const z = radius * Math.cos(theta);

                soul.setAttribute('position', {x, y, z});
                soul.setAttribute('class', 'color-soulInteractable color-soul');
                
                // 設定暈染質感
                soul.setAttribute('material', {
                    color: data.c, // 動態給予東方色彩
                    transparent: true,
                    opacity: 0.6, // 柔和的半透明
                    shader: 'flat', // 保持顏色純淨
                    side: 'double' // 雙面可見
                });

                // 隨機旋轉與縮放，增加自然感
                const randomScale = Math.random() * 0.5 + 0.4; // 縮放 0.4 - 0.9
                soul.setAttribute('scale', `${randomScale} ${randomScale} ${randomScale}`);
                soul.setAttribute('rotation', `0 0 ${Math.random() * 360}`); // 隨機Z軸旋轉

                // 漂浮動畫
                soul.setAttribute('animation', {
                    property: 'position',
                    to: `${x} ${y + (Math.random()-0.5)*1.2} ${z + (Math.random()-0.5)*1.2}`,
                    dur: 7000 + Math.random() * 5000,
                    dir: 'alternate',
                    loop: true,
                    easing: 'easeInOutSine'
                });

                // 點擊事件
                soul.addEventListener('mousedown', () => {
                    dialog.style.display = 'block';
                    qText.innerText = data.q;
                    
                    // 點擊視覺回饋：暈開放大並變透明
                    soul.setAttribute('animation__scale', 'property: scale; to: 1.5 1.5 1.5; dur: 400');
                    soul.setAttribute('animation__opacity', 'property: material.opacity; to: 0.2; dur: 400');
                });

                scene.appendChild(soul);
            }
        }

        // 啟動邏輯
        if (scene.hasLoaded) {
            spawnSouls();
        } else {
            scene.addEventListener('loaded', spawnSouls);
        }

        function handleAction() {
            qText.innerText = "聆聽中......您的感受已被溫柔接住。";
            setTimeout(() => { dialog.style.display = 'none'; }, 2500);
        }
    </script>
</body>
</html>
