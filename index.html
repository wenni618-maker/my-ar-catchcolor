<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>靈魂色塊：墨染空間</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f7f1e1; }
        #interface {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
            font-family: 'PingFang TC', serif;
        }
        #dialog-box {
            position: absolute; bottom: 50px; left: 50%;
            transform: translateX(-50%); width: 85%; max-width: 500px;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px; border-radius: 20px;
            text-align: center; display: none; pointer-events: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .btn {
            background: #4a4a4a; color: #fff; border: none;
            padding: 12px 30px; border-radius: 30px; cursor: pointer;
        }

        /* 關鍵：SVG 濾鏡，將圓形變成有機噴濺狀 */
        .ink-filter {
            filter: url(#organic-ink);
        }
    </style>
</head>
<body>

    <svg style="position: absolute; width: 0; height: 0;">
        <filter id="organic-ink">
            <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="40" />
        </filter>
    </svg>

    <div id="interface">
        <div id="dialog-box">
            <p id="question-text"></p>
            <button class="btn" onclick="handleAction()">對它傾訴...</button>
        </div>
    </div>

    <a-scene embedded cursor="rayOrigin: mouse" raycaster="objects: .color-soul">
        <a-assets>
            <img id="my-bg" src="IMG_3120.jpg">
        </a-assets>

        <a-sky src="#my-bg" rotation="0 -90 0"></a-sky>
        
        <a-entity light="type: ambient; intensity: 1.5"></a-entity>

        <a-entity camera look-controls position="0 1.6 0"></a-entity>
    </a-scene>

    <script>
        const colorsData = [
            { c: '#E63946', q: '灼熱的硃砂紅。它是心頭的熱血，還是警示的憤怒？' },
            { c: '#0A0A0A', q: '沉靜的墨黑。它是萬物的起點，還是終極的虛無？' },
            { c: '#A8DADC', q: '清冽的石青。它是早春的溪水，還是自由的呼吸？' },
            { c: '#fcbf49', q: '閃耀的藤黃。它是希望的晨曦，還是昨日的輝煌？' },
            { c: '#7b2cbf', q: '神祕的石蓮紫。它是醒不來的夢，你想留在夢裡嗎？' }
        ];

        const scene = document.querySelector('a-scene');
        const dialog = document.getElementById('dialog-box');
        const qText = document.getElementById('question-text');

        function spawnSouls() {
            // 先清空可能存在的錯誤殘留
            console.log("正在生成有機墨染色塊...");
            
            for (let i = 0; i < 30; i++) {
                const data = colorsData[i % colorsData.length];
                
                // 使用最基礎的 circle，絕對能顯示
                const soul = document.createElement('a-circle');
                
                const radius = Math.random() * 5 + 3;
                const theta = Math.random() * Math.PI * 2;
                const x = radius * Math.sin(theta);
                const y = Math.random() * 3 + 0.5;
                const z = radius * Math.cos(theta);

                soul.setAttribute('position', {x, y, z});
                soul.setAttribute('radius', Math.random() * 0.4 + 0.3);
                soul.setAttribute('class', 'color-soul');
                
                // 這裡運用一點技巧：讓圓形始終面向玩家
                soul.setAttribute('material', {
                    color: data.c,
                    transparent: true,
                    opacity: 0.7,
                    shader: 'flat',
                    side: 'double'
                });

                // 讓色塊面向中心（相機）
                soul.setAttribute('look-at', '[camera]');

                // 增加動畫
                soul.setAttribute('animation', {
                    property: 'position',
                    to: `${x} ${y + 0.5} ${z}`,
                    dur: 5000 + Math.random() * 4000,
                    dir: 'alternate',
                    loop: true,
                    easing: 'easeInOutSine'
                });

                soul.addEventListener('mousedown', () => {
                    dialog.style.display = 'block';
                    qText.innerText = data.q;
                    soul.setAttribute('animation__click', 'property: scale; to: 2 2 2; dur: 300');
                });

                scene.appendChild(soul);
            }
        }

        if (scene.hasLoaded) {
            spawnSouls();
        } else {
            scene.addEventListener('loaded', spawnSouls);
        }

        function handleAction() {
            qText.innerText = "聆聽中...您的感受已被溫柔接住。";
            setTimeout(() => { dialog.style.display = 'none'; }, 2000);
        }
    </script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
</body>
</html>
